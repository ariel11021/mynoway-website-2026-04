<html lang="zh-TW">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #2c1f1a;
      --white: #fffdf9;
      --gray-50: #fdf6f0;
      --gray-100: #f5ebe2;
      --gray-200: #e8d5c8;
      --gray-400: #b89f94;
      --gray-600: #7a6460;
      --accent: #c07b74;
      --accent-light: #d9a49e;
      --accent-dark: #a05850;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      color: var(--black);
      background: var(--white);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5%;
      height: 64px;
      background: rgba(255,253,249,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--gray-200);
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--black);
      text-decoration: none;
    }

    .logo span { color: var(--accent); }

    nav ul {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    nav ul a {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--gray-600);
      text-decoration: none;
      transition: color 0.2s;
    }

    nav ul a:hover { color: var(--black); }
    nav ul a.active { color: var(--accent); font-weight: 600; }

    .nav-cta {
      background: var(--black);
      color: var(--white) !important;
      padding: 0.45rem 1.1rem;
      border-radius: 8px;
      transition: background 0.2s !important;
    }

    .nav-cta:hover { background: var(--accent) !important; color: var(--white) !important; }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 120px 5% 60px;
      text-align: center;
      background: linear-gradient(160deg, #fffdf9 0%, #fdf0ea 45%, #fce8e6 100%);
    }

    .section-label {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--gray-100);
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      margin-bottom: 1.25rem;
    }

    .page-title {
      font-size: clamp(2rem, 4.5vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.15;
      color: var(--black);
      margin-bottom: 1rem;
    }

    .page-sub {
      font-size: 1.05rem;
      color: var(--gray-600);
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.7;
    }

    /* ── FILTER TABS ── */
    .filter-bar {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 40px 5% 0;
      background: var(--white);
    }

    .filter-btn {
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--gray-600);
      background: var(--gray-50);
      border: 1.5px solid var(--gray-200);
      border-radius: 999px;
      padding: 0.4rem 1.1rem;
      cursor: pointer;
      transition: all 0.18s;
    }

    .filter-btn:hover {
      border-color: var(--accent-light);
      color: var(--accent);
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--white);
      font-weight: 600;
    }

    /* ── GRID ── */
    .grid-section {
      padding: 40px 5% 100px;
    }

    .template-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.75rem;
    }

    @media (max-width: 900px) {
      .template-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 560px) {
      .template-grid { grid-template-columns: 1fr; }
    }

    /* ── CARD ── */
    .template-card {
      background: var(--white);
      border: 1.5px solid var(--gray-200);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }

    .template-card:hover {
      border-color: var(--accent-light);
      box-shadow: 0 8px 32px rgba(192,123,116,0.14);
      transform: translateY(-4px);
    }

    .card-image {
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      background: var(--gray-100);
      display: block;
    }

    .card-image-placeholder {
      width: 100%;
      aspect-ratio: 16 / 10;
      background: linear-gradient(135deg, var(--gray-100), var(--gray-200));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: var(--gray-400);
    }

    .card-body {
      padding: 1.25rem 1.4rem 1.5rem;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-bottom: 0.7rem;
    }

    .card-tag {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--accent-dark);
      background: var(--gray-100);
      border-radius: 999px;
      padding: 0.2rem 0.6rem;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      line-height: 1.4;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-price {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--accent-dark);
    }

    .card-price.free {
      color: #5a8a6a;
    }

    .card-arrow {
      font-size: 0.8rem;
      color: var(--gray-400);
      transition: color 0.2s, transform 0.2s;
    }

    .template-card:hover .card-arrow {
      color: var(--accent);
      transform: translateX(3px);
    }

    /* ── STATES ── */
    .state-container {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 0;
      color: var(--gray-400);
    }

    .state-container .state-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .state-container p {
      font-size: 0.95rem;
    }

    .skeleton-card {
      background: var(--white);
      border: 1.5px solid var(--gray-200);
      border-radius: 16px;
      overflow: hidden;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .skeleton-img {
      width: 100%;
      aspect-ratio: 16 / 10;
      background: var(--gray-100);
    }

    .skeleton-body { padding: 1.25rem 1.4rem 1.5rem; }

    .skeleton-line {
      height: 12px;
      background: var(--gray-100);
      border-radius: 6px;
      margin-bottom: 0.6rem;
    }

    .skeleton-line.short { width: 40%; }
    .skeleton-line.medium { width: 70%; }
    .skeleton-line.full { width: 100%; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ── FOOTER ── */
    footer {
      background: linear-gradient(135deg, #c87b72, #a05850);
      color: rgba(255,255,255,0.8);
      padding: 3rem 5% 2rem;
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.25);
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .footer-logo {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.04em;
    }

    .footer-logo span { color: rgba(255,255,255,0.7); }

    .footer-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }

    .footer-links a {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--white); }

    .footer-copy {
      font-size: 0.8rem;
      text-align: center;
    }

    .footer-social {

      gap: 0.75rem;
      align-items: center;

    .footer-social a {
      width: 38px; height: 38px;

    .footer-social a:hover {

      transform: translateY(-2px);
    }

    .footer-social svg { width: 18px; height: 18px; fill: currentColor; }

    @media (max-width: 768px) {

      .footer-inner { flex-direction: column; text-align: center; }
      .footer-links { justify-content: center; }
      .footer-social { justify-content: center; }
    }
  </style>
</head>

<script>
  let allTemplates = [];
  let activeCategory = 'all';

  async function loadTemplates() {
    try {
      const res = await fetch('/api/templates');
      if (!res.ok) throw new Error('API error');
      allTemplates = await res.json();
      buildFilterTabs();
      renderCards('all');
    } catch (err) {
      document.getElementById('templateGrid').innerHTML = `
        <div class="state-container">
          <div class="state-icon">⚠️</div>
          <p>模板載入失敗，請重新整理頁面</p>
        </div>`;
    }
  }

  function buildFilterTabs() {
    const categories = ['all', ...new Set(allTemplates.flatMap(t => t.categories))];
    const bar = document.getElementById('filterBar');
    bar.innerHTML = categories.map(cat => `
      <button class="filter-btn${cat === 'all' ? ' active' : ''}" data-category="${cat}">
        ${cat === 'all' ? '全部' : cat}
      </button>
    `).join('');

    bar.addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = btn.dataset.category;
      renderCards(activeCategory);
    });
  }

  function renderCards(category) {
    const grid = document.getElementById('templateGrid');
    const filtered = category === 'all'
      ? allTemplates
      : allTemplates.filter(t => t.categories.includes(category));

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="state-container">
          <div class="state-icon">📭</div>
          <p>這個分類目前還沒有模板</p>
        </div>`;
      return;
    }

    grid.innerHTML = filtered.map(t => {
      const imageHtml = t.image
        ? `<img class="card-image" src="${t.image}" alt="${t.name}" loading="lazy">`
        : `<div class="card-image-placeholder">📄</div>`;

      const tagsHtml = t.categories.map(c => `<span class="card-tag">${c}</span>`).join('');

      const priceClass = t.price === '免費' || t.price.toLowerCase() === 'free' ? 'free' : '';

      return `
        <a class="template-card" href="${t.link || '#'}" target="_blank" rel="noopener">
          ${imageHtml}
          <div class="card-body">
            <div class="card-tags">${tagsHtml}</div>
            <div class="card-title">${t.name}</div>
            <div class="card-footer">
              <span class="card-price ${priceClass}">${t.price || '—'}</span>
              <span class="card-arrow">前往取得 →</span>
            </div>
          </div>
        </a>`;
    }).join('');
  }

  loadTemplates();
</script>
